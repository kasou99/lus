<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LUS Repair Base</title>
    <link rel="stylesheet" href="style.css?v=20260519-3">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">現場ダッシュボード</p>
        <h1>LUS Repair Base</h1>
        <p class="header-copy">工作機械修理のための天気、予定、営業メモをまとめる現場基地。</p>
      </div>
      <div class="header-meta">
        <span id="todayLabel"></span>
        <span class="status-pill">端末内保存 + Sheets同期</span>
      </div>
    </header>

    <main class="layout">
      <section class="weather-panel" aria-labelledby="weatherTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">天気</p>
            <h2 id="weatherTitle">今日の現場コンディション</h2>
          </div>
          <label class="select-label">
            地域
            <select id="locationSelect"></select>
          </label>
        </div>

        <div class="weather-grid">
          <div class="temperature-block">
            <span class="location-name" id="locationName">読み込み中</span>
            <strong id="currentTemp">--℃</strong>
            <span id="weatherSummary">天気を取得しています</span>
          </div>
          <div class="metric-row" aria-label="気象データ">
            <div>
              <span>最高</span>
              <strong id="maxTemp">--℃</strong>
            </div>
            <div>
              <span>最低</span>
              <strong id="minTemp">--℃</strong>
            </div>
            <div>
              <span>湿度</span>
              <strong id="humidity">--%</strong>
            </div>
            <div>
              <span>降水</span>
              <strong id="rainChance">--%</strong>
            </div>
            <div>
              <span>風速</span>
              <strong id="windSpeed">--m/s</strong>
            </div>
          </div>
        </div>

        <div class="alert-band" id="heatAlert">
          <span>暑さ注意</span>
          <strong>判定中</strong>
          <p>気温と湿度から現場向けの注意コメントを出します。</p>
        </div>

        <div class="forecast-strip" id="forecastStrip" aria-label="数日予報"></div>
      </section>

      <section class="calendar-panel" aria-labelledby="calendarTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">予定</p>
            <h2 id="calendarTitle">3カ月カレンダー</h2>
          </div>
          <button class="ghost-button" id="goTodayButton" type="button">今日へ</button>
        </div>
        <div class="months" id="months"></div>
      </section>

      <aside class="side-panel" aria-label="予定と営業メモ">
        <section class="agenda-block">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">直近</p>
              <h2>向こう14日の予定</h2>
            </div>
          </div>
          <div class="agenda-list" id="agendaList"></div>
        </section>

        <section class="day-editor">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">選択日</p>
              <h2 id="selectedDateTitle">日付を選択</h2>
            </div>
          </div>
          <form id="eventForm" class="event-form">
            <input id="eventTime" type="time" aria-label="時間">
            <select id="eventType" aria-label="種別">
              <option value="repair">修理</option>
              <option value="inspection">点検</option>
              <option value="estimate">見積</option>
              <option value="contact">連絡</option>
              <option value="move">移動</option>
            </select>
            <input id="eventTitle" type="text" placeholder="予定名 例: A社 NC旋盤 異音確認" required>
            <textarea id="eventMemo" placeholder="メモ 例: 現地でアラーム履歴を確認"></textarea>
            <button type="submit">予定を追加</button>
          </form>
          <div class="selected-events" id="selectedEvents"></div>
        </section>

        <section class="sync-block">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">同期</p>
              <h2>Google Sheets</h2>
            </div>
          </div>
          <label class="sync-label">
            Apps Script URL
            <input id="syncUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec">
          </label>
          <div class="sync-actions">
            <button type="button" id="saveSyncUrl">URL保存</button>
            <button type="button" id="pullEvents">読み込み</button>
            <button type="button" id="pushEvents">保存</button>
          </div>
          <p class="sync-status" id="syncStatus">未設定</p>
        </section>

        <section class="prompt-block">
          <div class="section-head compact">
            <div>
              <p class="eyebrow">Grok / X</p>
              <h2>営業プロンプト</h2>
            </div>
          </div>
          <div class="prompt-buttons">
            <button type="button" data-prompt="weather">暑さ注意を投稿文に</button>
            <button type="button" data-prompt="news">製造業ニュースを営業ネタに</button>
            <button type="button" data-prompt="case">修理事例を説明文に</button>
          </div>
          <textarea id="promptOutput" readonly></textarea>
        </section>
      </aside>
    </main>

    <script src="app.js?v=20260519-3"></script>
  </body>
</html>
