name: Update news headlines

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/update-news.mjs'
      - '.github/workflows/update-news.yml'
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate news.json
        run: node scripts/update-news.mjs
      - name: Commit news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update news headlines"
          git push
